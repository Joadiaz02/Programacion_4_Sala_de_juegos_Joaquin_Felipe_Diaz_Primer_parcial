<!-- app.html -->
<video autoplay muted loop id="bg-video">

  <source
    src="/assets/fondo-video.mp4"
    type="video/mp4">

</video>
<nav class="retro-navbar">

  <div class="logo-section">

    <img
      src="/assets/logo.png"
      class="logo-img"
      alt="JFD Games"
    >

    <div>
      <h1 class="logo-title">
        Sala de Juegos
      </h1>

      <p class="logo-subtitle">
        
      </p>
    </div>

  </div>

  <div class="nav-links">
  <button routerLink="/">HOME</button>
  
  @if (auth.isAuthenticated()) {
    <button (click)="auth.logout()">CERRAR SESIÓN</button>
  } @else {
    <button routerLink="/login">LOGIN</button>
    <button routerLink="/registro">REGISTRO</button>
  }
  
  <button routerLink="/quien-soy">QUIÉN SOY</button>
</div>

</nav>

<router-outlet></router-outlet>
