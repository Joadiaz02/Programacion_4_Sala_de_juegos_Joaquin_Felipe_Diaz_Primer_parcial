<div class="login-container">
  <div class="login-card">

    <h1 class="titulo">&lt; LOGIN &gt;</h1>

    <form (ngSubmit)="onLogin()">

      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }

      <div class="mb-3">
        <input
          type="email"
          [(ngModel)]="emailValue"
          name="email"
          placeholder="Email"
          required
          class="form-control retro-input"
        />
      </div>

      <div class="mb-3">
        <input
          type="password"
          [(ngModel)]="passwordValue"
          name="password"
          placeholder="Contraseña"
          required
          class="form-control retro-input"
        />
      </div>

      <button type="submit" class="btn w-100 retro-btn" [disabled]="cargando()">
        @if (cargando()) { CARGANDO... } @else { INGRESAR }
      </button>

    </form>

    <div class="divider">— ACCESO RÁPIDO —</div>

    <div class="d-flex gap-2 justify-content-center">
      <button class="btn retro-btn-quick" (click)="loginRapido('usuario1@test.com', '123456')">USUARIO 1</button>
      <button class="btn retro-btn-quick" (click)="loginRapido('usuario2@test.com', '123456')">USUARIO 2</button>
      <button class="btn retro-btn-quick" (click)="loginRapido('usuario3@test.com', '123456')">USUARIO 3</button>
    </div>

    <p class="registro-link">
      ¿No tenés cuenta?
      <a routerLink="/registro">Registrate</a>
    </p>

  </div>
</div>
